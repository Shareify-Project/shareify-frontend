apiVersion: v2
name: frontend
description: A Helm chart for Shareify Frontend
type: application
version: 0.1.0
appVersion: "1.1.6"
---
replicaCount: 1
image:
  repository: mvnsakash/shareify-frontend
  pullPolicy: IfNotPresent
  tag: "v1.1.6"
service:
  type: ClusterIP
  port: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
spec:
  ports:
    - port: {{ .Values.service.port }}
  selector:
    app: {{ .Chart.Name }}
