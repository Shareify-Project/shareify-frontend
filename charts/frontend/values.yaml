replicaCount: 1
image:
  repository: ghcr.io/shareify-project/shareify-frontend
  pullPolicy: Always
  tag: "a91225a"
  version: "2.0-bluegreen-test"
imagePullSecrets:
  - name: ghcr-secret
service:
  type: ClusterIP
  port: 8000
persistence:
