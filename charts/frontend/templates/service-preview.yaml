apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}-preview
spec:
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    app: {{ .Chart.Name }}
    # Argo Rollouts will automatically add a hash label here to point 
    # this service to the new "Green" version during a rollout.
